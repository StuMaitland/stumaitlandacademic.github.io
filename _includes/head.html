{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- Favicons -->
<link rel="icon" href="{{ base_path }}/images/favicon.ico" sizes="any">
<link rel="icon" href="{{ base_path }}/images/favicon.svg" type="image/svg+xml">
<link rel="icon" href="{{ base_path }}/images/favicon-32x32.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="{{ base_path }}/images/apple-touch-icon-180x180.png">
<link rel="manifest" href="{{ base_path }}/images/manifest.json">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">

<meta http-equiv="cleartype" content="on">
